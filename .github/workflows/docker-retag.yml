name: Retag Docker Image

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: "Existing :tag @sha256:hash to retag (e.g. :latest, @sha256:87e07f7..)"
        required: true
        default: ":latest"
      new_tags:
        description: "tags to add, comma-separated (e.g. stable, v0.32)"
        required: true
        default: "live"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: leelachesszero/lczero-client

jobs:
  retag:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate source tag
        run: |
          INPUT="${{ inputs.source_tag }}"
          if [[ "$INPUT" != :* && "$INPUT" != @* ]]; then
            echo "::error::source_tag must start with : or @ (e.g. :latest or @sha256:87e07f6...)"
            exit 1
          fi

      - name: Pull and retag
        run: |
          SOURCE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ inputs.source_tag }}"
          docker pull "$SOURCE"
          IFS=',' read -ra TAGS <<< "${{ inputs.new_tags }}"
          for tag in "${TAGS[@]}"; do
            tag=$(echo "$tag" | xargs)
            [ -n "$tag" ] && docker tag "$SOURCE" "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${tag}"
          done
          docker push --all-tags "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

name: Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      lc0_branch:
        description: "LeelaChessZero/lc0 branch, tag, or commit SHA"
        required: true
        default: "release/0.32"
      client_branch:
        description: "LeelaChessZero/lczero-client branch"
        required: true
        default: "release"
      custom_tags:
        description: "Tags, one per line (e.g. v0.32). Add 'live' to push auto-update to existing clients."
        required: false
        default: "latest"
        type: string
      cuda_version:
        description: "CUDA base image version"
        required: true
        default: "12.9.1"
      lc0_build_opts:
        description: "Lc0 meson flags"
        required: true
        default: "-Dplain_cuda=true -Dnative_cuda=false -Dnative_arch=false -Dopencl=false -Dcudnn=false -Donnx=false"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: leelachesszero/lczero-client

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare tags
        id: tags
        run: |
          TAGS=""
          while IFS= read -r tag; do
            tag=$(echo "$tag" | xargs)
            [ -n "$tag" ] && TAGS="${TAGS}${TAGS:+,}${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${tag}"
          done <<< "${{ inputs.custom_tags }}"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            LC0_BRANCH=${{ inputs.lc0_branch }}
            CLIENT_BRANCH=${{ inputs.client_branch }}
            CUDA_VERSION=${{ inputs.cuda_version }}
            LC0_BUILD_OPTS=${{ inputs.lc0_build_opts }}
